<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulir Pendaftaran – PPDB SMK Bakti Husada</title>
  <link rel="stylesheet" href="asset/css/style.css" />
</head>
<body>

  <header>
    <h1>🏥 Penerimaan Peserta Didik Baru (PPDB)</h1>
    <p>SMK Bakti Husada – Tahun Ajaran 2026/2027</p>
  </header>

  <nav>
    <a href="index.html">Beranda</a>
    <a href="alur.html">Alur Pendaftaran</a>
    <a href="form.html" class="active">Isi Formulir</a>
  </nav>

  <main>
    <div class="card">
      <h2>Formulir Biodata Calon Siswa</h2>
      <p>Mohon isi data berikut dengan benar sesuai dokumen asli.</p>

      <form>
        <div class="form-group">
          <label for="nama">Nama Lengkap Sesuai Ijazah/Akta:</label>
          <input
            type="text"
            id="nama"
            name="nama"
            placeholder="Cth: Budi Santoso"
          />
        </div>

        <div class="form-group">
          <label for="nik">Nomor Induk Kependudukan (NIK – 16 Digit):</label>
          <input
            type="number"
            id="nik"
            name="nik"
            placeholder="16 Digit NIK"
          />
        </div>

        <div class="form-group">
          <label for="jalur">Jalur Pendaftaran:</label>
          <select id="jalur" name="jalur">
            <option value="">-- Pilih Jalur --</option>
            <option value="zonasi">Zonasi</option>
            <option value="prestasi">Prestasi</option>
            <option value="afirmasi">Afirmasi</option>
            <option value="mutasi">Mutasi / Perpindahan Orang Tua</option>
          </select>
        </div>

        <button type="button" class="btn-submit" onclick="kirimPendaftaran()">
          Kirim Pendaftaran
        </button>
      </form>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 SMK Bakti Husada. Terakreditasi A.</p>
  </footer>

  <!-- Toast Notification -->
  <div id="toast"></div>

  <script src="asset/javascript/script.js"></script>
</body>
</html>
